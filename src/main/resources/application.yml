spring:
  application:
    name: svechka-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/svechka}
    username: ${DB_USER:svechka}
    password: ${DB_PASSWORD:svechka}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-change-me-please-32bytes-min}
  expiration-days: 30

ai:
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}
  api-key: ${AI_API_KEY:}
  transcription-model: ${AI_TRANSCRIPTION_MODEL:whisper-1}
  chat-model: ${AI_CHAT_MODEL:gpt-4o-mini}
  timeout-seconds: 30

# Yandex Cloud AI Studio (SpeechKit STT + YandexGPT) — used on the "prod" profile only.
yandex:
  folder-id: ${YANDEX_FOLDER_ID:}
  api-key: ${YANDEX_API_KEY:}
  stt-model: ${YANDEX_STT_MODEL:general}
  gpt-model: ${YANDEX_GPT_MODEL:yandexgpt}
  timeout-seconds: 30

logging:
  level:
    com.svechka.backend: INFO
    com.svechka.backend.ai: INFO
